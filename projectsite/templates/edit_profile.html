{% extends 'base.html' %}
{% load static %}
{% block title %}Edit Profile - PSUSphere{% endblock %}
{% block content %}
<style>
    .edit-section {
        padding: 30px 0;
    }
    .form-card {
        border-radius: 12px;
        border: none;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        background: white;
    }
    .form-control {
        border-radius: 10px;
        border: 2px solid #e8e8e8 !important;
        padding: 12px 18px !important;
        transition: all 0.3s ease !important;
        font-size: 0.95rem;
    }
    .form-control:focus {
        border-color: var(--primary-color) !important;
        box-shadow: 0 0 0 0.2rem rgba(0, 191, 166, 0.15) !important;
    }
    .form-label {
        font-weight: 700;
        color: #333;
        margin-bottom: 10px;
        font-size: 0.95rem;
        letter-spacing: 0.3px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .btn-save {
        background: var(--primary-gradient) !important;
        border: none !important;
        color: white !important;
        border-radius: 25px !important;
        padding: 12px 45px !important;
        font-weight: 600;
        transition: all 0.3s ease !important;
    }
    .btn-save:hover {
        background: var(--primary-gradient) !important;
        opacity: 0.9;
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(0, 191, 166, 0.3) !important;
    }
    .btn-cancel {
        border-radius: 25px !important;
        padding: 12px 45px !important;
        font-weight: 600;
        transition: all 0.3s ease !important;
        border: 2px solid var(--primary-color) !important;
        color: var(--primary-color) !important;
        background: white !important;
    }
    .btn-cancel:hover {
        background: #e0f7fa !important;
        transform: translateY(-3px);
    }
</style>
<div class="container-fluid edit-section">
    <div class="page-header text-center">
        <h1 class="page-title mb-2">Edit Profile</h1>
        <p class="page-subtitle">Update your personal information</p>
    </div>
    <div class="row">
        <div class="col-lg-8 offset-lg-2">
            <div class="card form-card">
                <div class="card-body p-5">
                    <form>
                        <div class="row">
                            <div class="form-group col-md-6">
                                <label for="firstName" class="form-label">👤 First Name</label>
                                <input type="text" class="form-control" id="firstName" placeholder="Enter your first name">
                            </div>
                            <div class="form-group col-md-6">
                                <label for="lastName" class="form-label">👤 Last Name</label>
                                <input type="text" class="form-control" id="lastName" placeholder="Enter your last name">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="email" class="form-label">📧 Email</label>
                            <input type="email" class="form-control" id="email" placeholder="Enter your email address">
                        </div>
                        <div class="form-group">
                            <label for="phone" class="form-label">📱 Phone Number</label>
                            <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number">
                        </div>
                        <div class="form-group">
                            <label for="bio" class="form-label">ℹ️ About Me</label>
                            <textarea class="form-control" id="bio" rows="4" placeholder="Write a short bio about yourself..."></textarea>
                        </div>
                        <div class="mt-5 text-center">
                            <button type="submit" class="btn btn-save">
                                <i class="fa fa-save mr-2"></i>Save Changes
                            </button>
                            <a href="{% url 'profile' %}" class="btn btn-cancel ms-3">
                                <i class="fa fa-times mr-2"></i>Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
